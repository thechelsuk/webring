title: Nuchronic
description: Dark-mode Hacker News-style feed for the chronically ill indie web.
url: ""
baseurl: ""
timezone: UTC
markdown: kramdown
permalink: /item/:slug/
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap
feed:
  path: feed.xml
paginate: 30
paginate_path: /page:num/
header_nav:
  links:
    - label: Home
      url: /
    - label: Feed
      url: /feed.xml
    - label: About
      url: /about
    - label: Submit
      url: https://github.com/thechelsuk/uk.nuchronic/issues/new?template=feed-submission.yml
footer_nav:
  copyright: Nuchronic
  notice: The web ring for the chronically ill indie web.
  year: 2026
  links:
    - label: About
      url: "/about"
    - label: Terms
      url: "/terms"
    - label: Privacy
      url: "/privacy"
    - label: Sponsor
      url: "https://github.com/sponsors/thechelsuk"
    - label: ko-fi
      url: "https://ko-fi.com/thechelsuk"
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: anonymous
