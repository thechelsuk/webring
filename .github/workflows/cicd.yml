name: Pull and Deploy

on:
    schedule:
        - cron: "0 * * * *"
    workflow_dispatch:
    push:
        branches: ["main"]

permissions:
    contents: write
    pages: write
    id-token: write
concurrency:
    group: "pages"
    cancel-in-progress: false
jobs:
    sync:
        runs-on: ubuntu-latest
        outputs:
            changed: ${{ steps.commit.outputs.changed }}
            syndicate_before: ${{ steps.commit.outputs.syndicate_before }}
            syndicate_current: ${{ steps.commit.outputs.syndicate_current }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.ref_name }}

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Install Python dependencies
              run: |
                  python -m pip install --upgrade pip
                  if [[ -f _python/requirements.txt ]]; then
                    python -m pip install -r _python/requirements.txt
                  fi

            - name: Run source sync
              run: python _python/fetch_sources.py

            - name: Commit changes
              id: commit
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  EVENT_BEFORE: ${{ github.event.before }}
              run: |
                  original_sha="$(git rev-parse HEAD)"
                  syndicate_before="$original_sha"
                  if [[ "$EVENT_NAME" == "push" && -n "$EVENT_BEFORE" ]]; then
                    syndicate_before="$EVENT_BEFORE"
                  fi

                  if [[ -z "$(git status --porcelain)" ]]; then
                    echo "No changes to commit."
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                    echo "syndicate_before=$syndicate_before" >> "$GITHUB_OUTPUT"
                    echo "syndicate_current=$original_sha" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  git config user.name "GitHub Action"
                  git config user.email "action@github.com"
                  git add -A
                  git commit -m "Chore: sync sources $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
                  git push origin HEAD:${GITHUB_REF_NAME}
                  current_sha="$(git rev-parse HEAD)"
                  echo "changed=true" >> "$GITHUB_OUTPUT"
                  echo "syndicate_before=$syndicate_before" >> "$GITHUB_OUTPUT"
                  echo "syndicate_current=$current_sha" >> "$GITHUB_OUTPUT"
    build:
        runs-on: ubuntu-latest
        needs: sync
        if: github.event_name == 'push' || needs.sync.outputs.changed == 'true'
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.ref_name }}
            - name: Setup Pages
              uses: actions/configure-pages@v6
            - name: Build with Jekyll
              uses: actions/jekyll-build-pages@v1
              with:
                  source: ./
                  destination: ./_site
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

    syndicate:
        runs-on: ubuntu-latest
        needs:
            - sync
            - deploy
        if: github.event_name == 'push' || needs.sync.outputs.changed == 'true'
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.ref_name }}

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Install Python dependencies
              run: |
                  python -m pip install --upgrade pip
                  if [[ -f _python/requirements.txt ]]; then
                    python -m pip install -r _python/requirements.txt
                  fi

            - name: Publish new posts
              id: publish
              continue-on-error: true
              run: |
                  export PYTHON_BIN=python
                  bash .github/scripts/syndicate-new-posts.sh \
                    "${{ needs.sync.outputs.syndicate_before }}" \
                    "${{ needs.sync.outputs.syndicate_current }}"

            - name: Commit outgoing publication state
              if: always()
              run: |
                  if [[ -z "$(git status --porcelain)" ]]; then
                    echo "No publication state changes to commit."
                    exit 0
                  fi

                  git config user.name "GitHub Action"
                  git config user.email "action@github.com"
                  git add -A
                  git commit -m "Chore: record outgoing mentions $(date -u +%Y-%m-%dT%H:%M)"
                  git push origin HEAD:${GITHUB_REF_NAME}

            - name: Fail if publication had errors
              if: steps.publish.outcome == 'failure'
              run: exit 1
